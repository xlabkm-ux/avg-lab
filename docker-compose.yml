services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: avg
      POSTGRES_PASSWORD: avg
      POSTGRES_DB: avg
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avg -d avg"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - avg-dev

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - avg-dev

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1'"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
    networks:
      - avg-dev

volumes:
  postgres-data:
  neo4j-data:

networks:
  avg-dev:
    name: avg-dev
